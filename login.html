<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="login.css">
		<title>Talos V2</title>
	</head>
	<body>
		<div id="successIndicator" hidden=true>
			<h3>Login Failed!</h3>
			<p>Please try again.</p>
		</div>
		<main>
			<form method="POST" action="login.py">
			<h1>Talos V2</h1>
				Username:&nbsp;<input type='text' name='username' placeholder='Enter Username Here'><br><br>
				Password:&nbsp;&nbsp;<input type='text' name='password' placeholder='Enter Password'><br><br>
				
				<input class='btn' type='submit' action='submit.py' name='submit' value='Login'>
			<h6>&copy; 2026 Daniel Manita</h6>
			</form>
		</main>

		<!-- Failure script -->
		<script>
			const queryString = window.location.search;
			
			const urlParams = new URLSearchParams(queryString);
			
			const user = urlParams.get('login');

			if(user!=null) {
				document.getElementById("successIndicator").hidden=false;
			}
		</script>
	</body>
</html>
