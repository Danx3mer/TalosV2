<!DOCTYPE html>
<html>
	<head>
	    <link rel="stylesheet" href="home.css">
		<title>Talos V2</title>
	</head>
	<body>
		<div class="Container">
		<div class="Navbar">
			<h1>Talos V2</h1>
		</div>
		<main>
				<div id="header"></div>
			<!-- 	
				Different home page based on user type. 
			 	Admin: Directory view. Subviews for students and teachers. Each subview should have the ability to remove and delete a teacher via a form. Can modify courses. 
				Teacher: Teacher Course view. Show student grades, ability to put in and modify grades. Show courses currently teaching. Cannot modify courses.
				Student: Student Course view. Show student grades, and currently enrolled courses. (Extra: show grad requirements)
			-->
		</main>
		</div>
		<script>
			function getCookie(cookieName) {
				let cookies = document.cookie.split(";");

				for(int i=0; i<cookies.length; i++) {
					let pair = cookies[i].split('=');
					let key = pair[0].trim();

					if(key === cookieName) {
						return pair[1].trim();
					}
				}

				return null;
			}

			const retrievedUsername = getCookie('username')
			const retrievedPassword = getCookie('password')
			
			console.log(retrievedUsername)
			console.log(retrievedPassword)
		</script>
	</body>
</html>
